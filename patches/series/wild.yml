{
  "schema_version": 1,
  "id": "wild",
  "operations": [
    {
      "id": "hmbird-fengchi-oneplus13",
      "type": "apply",
      "dependency": "wild_kernel_patches",
      "path_by_base": {
        "oos15-cn": "oneplus/hmbird/deprecated/fengchi_OP13_A15.patch",
        "oos15-global": "oneplus/hmbird/fengchi_OP13-CPH_A15.patch",
        "oos16": "oneplus/hmbird/fengchi_OP13_A16.patch"
      },
      "cwd": "kernel_platform/common",
      "strip": 1,
      "fuzz": 1,
      "feature": "oneplus.hmbird_fengchi_scx"
    },
    {
      "id": "hmbird-fengchi-oneplus13-vendor",
      "type": "exec",
      "dependency": "wild_kernel_patches",
      "cwd": ".",
      "argv": [
        "python3",
        "{repo_root}/scripts/integrate-vendor-hmbird.py",
        "--source-dir",
        "{source_dir}/kernel_platform/msm-kernel",
        "--common-dir",
        "{source_dir}/kernel_platform/common",
        "--wild-dir",
        "{dependency_dir:wild_kernel_patches}",
        "--base",
        "{base}",
        "--repository-root",
        "{repo_root}"
      ],
      "expected_outputs": [
        "kernel_platform/msm-kernel/.op13-hmbird-vendor.json"
      ],
      "feature": "oneplus.hmbird_fengchi_scx"
    },
    {
      "id": "hmbird-sched-prop-oos15",
      "type": "exec",
      "cwd": ".",
      "argv": [
        "python3",
        "{repo_root}/scripts/integrate-oos15-hmbird-sched-prop.py",
        "--source-dir",
        "{source_dir}",
        "--base",
        "{base}"
      ],
      "expected_outputs": [
        ".op13/oos15-hmbird-sched-prop.json"
      ],
      "bases": ["oos15-cn", "oos15-global"],
      "feature": "oneplus.hmbird_fengchi_scx"
    },
    {
      "id": "hmbird-sched-assist-oos15-cn",
      "type": "exec",
      "cwd": ".",
      "argv": [
        "python3",
        "{repo_root}/scripts/integrate-oos15-cn-hmbird-overlay.py",
        "--source-dir",
        "{source_dir}",
        "--base",
        "{base}"
      ],
      "expected_outputs": [
        ".op13/oos15-cn-hmbird-overlay.json"
      ],
      "bases": ["oos15-cn"],
      "feature": "oneplus.hmbird_fengchi_scx"
    },
    {
      "id": "hmbird-cpufreq-api-oos15-cn",
      "type": "apply",
      "path": "patches/oneplus13/hmbird/cpufreq-api-oos15-cn.patch",
      "cwd": "kernel_platform/common",
      "strip": 1,
      "bases": ["oos15-cn"],
      "feature": "oneplus.hmbird_fengchi_scx"
    },
    {
      "id": "hmbird-device-tree-overwriter",
