name: Build OnePlus 13 kernel modules

permissions:
  contents: write
  actions: write

inputs:
  op_config_json:
    description: 'JSON string containing full device config'
    required: true
    type: string
  optimize_level:
    required: false
    type: string
    default: O2
  manifest:
    required: true
    type: string
    default: OOS15

runs:
  using: composite
  steps:
    - name: Parse op_config_json
      shell: bash
      run: |
        set -euo pipefail
        echo '${{ inputs.op_config_json }}' > /tmp/config.json
        jq -r 'to_entries[] | "\(.key | ascii_upcase)=\(.value)"' /tmp/config.json >> "$GITHUB_ENV"
        echo "Parsed config:"
        jq '.' /tmp/config.json

    - name: Set Manifest
      shell: bash
      run: |
        set -euo pipefail
        # Use case to avoid ${!var} indirect-expansion issues in composite actions
        case "${{ inputs.manifest }}" in
          OOS15) echo "MANIFEST=$MANIFEST_OOS15_MODULES" >> "$GITHUB_ENV" ;;
          OOS16) echo "MANIFEST=$MANIFEST_OOS16_MODULES" >> "$GITHUB_ENV" ;;
          *)     echo "Unknown manifest: ${{ inputs.manifest }}"; exit 1 ;;
        esac

    - name: Validate Inputs
      shell: bash
      run: |
        set -euo pipefail
        model="$MODEL"; soc="$SOC"; branch="$BRANCH"; manifest="$MANIFEST"
        [[ -n "$model" ]]    || { echo "model empty"; exit 1; }
        [[ -n "$soc" ]]      || { echo "soc empty"; exit 1; }
        [[ -n "$branch" ]]   || { echo "branch empty"; exit 1; }
        [[ -n "$manifest" ]] || { echo "manifest empty — check manifest_oos15_modules key in config JSON"; exit 1; }
        if [[ "$manifest" == http*://* ]]; then
          [[ "$manifest" =~ ^https:// ]] || { echo "Manifest URL must be HTTPS"; exit 1; }
        else
          [[ "$manifest" =~ \.xml$ ]] || { echo "Manifest must end with .xml"; exit 1; }
        fi
        echo "Inputs OK: model=$model soc=$soc branch=$branch manifest=$manifest"

    - name: Aggressive cleanup
      shell: bash
      run: |
        set -euo pipefail
        sudo rm -rf /usr/share/dotnet /usr/share/swift /usr/local/.ghcup
        sudo rm -rf /usr/local/julia* /usr/local/lib/android /usr/local/share/chromium
        sudo rm -rf /opt/microsoft /opt/google /opt/az /usr/local/share/powershell
        sudo rm -rf /opt/hostedtoolcache
        docker system prune -af || true
        docker builder prune -af || true
        df -h

    - name: Install Minimal Dependencies
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get -o Acquire::Retries=3 update -qq
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
          git curl ca-certificates build-essential clang lld flex bison \
          libelf-dev libssl-dev libncurses-dev zlib1g-dev liblz4-tool \
          libxml2-utils rsync unzip dwarves file python3 ccache
        sudo apt-get clean

    - name: Setup Base Environment
      shell: bash
      run: |
        set -euo pipefail
        CONFIG="$MODEL"
        echo "CONFIG=$CONFIG" >> "$GITHUB_ENV"
        REPO="/usr/local/bin/repo"
        if [ ! -x "$REPO" ]; then
          curl -s https://storage.googleapis.com/git-repo-downloads/repo -o "$REPO"
          chmod +x "$REPO"
        fi
        echo "REPO=$REPO" >> "$GITHUB_ENV"

    - name: Initialize and Sync Kernel Source
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p "$CONFIG"
        cd "$CONFIG"

        MANIFEST_FILE="${GITHUB_WORKSPACE}/manifests/${MANIFEST}"
        if [ -f "$MANIFEST_FILE" ]; then
          echo "Using local manifest: $MANIFEST_FILE"
          "$REPO" init -u https://github.com/OnePlusOSS/kernel_manifest.git -b "$BRANCH" --repo-rev=v2.16 --depth=1 --no-clone-bundle --no-tags || true
          mkdir -p .repo/manifests
          cp "$MANIFEST_FILE" .repo/manifests/custom_manifest.xml
          "$REPO" init -m custom_manifest.xml
        elif [[ "$MANIFEST" == https://* ]]; then
          mkdir -p .repo/manifests
          curl --fail --show-error --location --proto '=https' "$MANIFEST" -o .repo/manifests/custom_manifest.xml
          "$REPO" init -u https://github.com/OnePlusOSS/kernel_manifest.git -b "$BRANCH" -m custom_manifest.xml --repo-rev=v2.16 --depth=1 --no-clone-bundle --no-tags
        else
          "$REPO" init -u https://github.com/OnePlusOSS/kernel_manifest.git -b "$BRANCH" -m "$MANIFEST" --repo-rev=v2.16 --depth=1 --no-clone-bundle --no-tags
        fi
        success=false
        for i in 1 2 3; do
          if "$REPO" sync -c --no-clone-bundle --no-tags --optimized-fetch \
             -j"$(nproc --all)" --fail-fast; then
            success=true; break
          fi
          echo "repo sync attempt $i failed; retrying..."; sleep 30
        done
        $success || { echo "repo sync failed after 3 attempts"; exit 1; }

    - name: Detect kernel directory (common vs msm-kernel)
      shell: bash
      run: |
        set -euo pipefail
        KERNEL_PLATFORM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        # SM8750 (sun) syncs kernel to common/; older SoCs use msm-kernel/
        if [ -d "$KERNEL_PLATFORM/common" ]; then
          MSM="$KERNEL_PLATFORM/common"
          echo "Detected SM8750-style layout: using kernel_platform/common/"
        elif [ -d "$KERNEL_PLATFORM/msm-kernel" ]; then
          MSM="$KERNEL_PLATFORM/msm-kernel"
          echo "Detected legacy layout: using kernel_platform/msm-kernel/"
        else
          echo "ERROR: Neither common/ nor msm-kernel/ found under kernel_platform/"
          ls "$KERNEL_PLATFORM/" 2>/dev/null || echo "(kernel_platform dir missing)"
          exit 1
        fi
        echo "MSM=$MSM" >> "$GITHUB_ENV"
        echo "KERNEL_PLATFORM=$KERNEL_PLATFORM" >> "$GITHUB_ENV"

    - name: Get Kernel Version Info
      shell: bash
      run: |
        set -euo pipefail
        ARTIFACTS_DIR="$GITHUB_WORKSPACE/$CONFIG/artifacts"
        mkdir -p "$ARTIFACTS_DIR"
        cd "$MSM"
        BRANCH_LINE=""
        for f in build.config.common build.config.constants; do
          if [ -f "$f" ]; then
            l=$(grep '^[[:space:]]*BRANCH=' "$f" || true)
            if [ -n "$l" ]; then BRANCH_LINE="$l"; break; fi
          fi
        done
        if [ -z "$BRANCH_LINE" ]; then
          echo "Error: No BRANCH= found in build config files"; exit 1
        fi
        BRANCH_VALUE="${BRANCH_LINE#*=}"
        ANDROID_VERSION="${BRANCH_VALUE%-*}"
        VERSION=$(grep '^VERSION *=' Makefile | awk '{print $3}')
        PATCHLEVEL=$(grep '^PATCHLEVEL *=' Makefile | awk '{print $3}')
        SUBLEVEL=$(grep '^SUBLEVEL *=' Makefile | awk '{print $3}')
        FULL_VERSION="$VERSION.$PATCHLEVEL.$SUBLEVEL"
        echo "ANDROID_VER=$ANDROID_VERSION" >> "$GITHUB_ENV"
        echo "KERNEL_VER=$VERSION.$PATCHLEVEL" >> "$GITHUB_ENV"
        echo "KERNEL_FULL_VER=$ANDROID_VERSION-$FULL_VERSION" >> "$GITHUB_ENV"
        echo "Kernel: $FULL_VERSION  Android: $ANDROID_VERSION"

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2.19
      with:
        key: ${{ env.CONFIG }}-modules-${{ env.KERNEL_FULL_VER }}
        max-size: 5G
        append-timestamp: false
        create-symlink: true
        job-summary: 'CCache stats'
        evict-old-files: 'job'

    - name: Clean Up ABI Protected Exports
      shell: bash
      run: |
        set -euo pipefail
        rm -f "$KERNEL_PLATFORM/msm-kernel/android/abi_gki_protected_exports_"* 2>/dev/null || true
        rm -f "$KERNEL_PLATFORM/common/android/abi_gki_protected_exports_"* 2>/dev/null || true
        df -h

    - name: Merge vendor defconfig
      shell: bash
      run: |
        set -euo pipefail
        cd "$MSM"
        make ARCH=arm64 mrproper
        mkdir -p out
        VENDOR_CFG="arch/arm64/configs/vendor/${SOC}_GKI.config"
        if [ -f "$VENDOR_CFG" ]; then
          echo "Merging vendor defconfig: $VENDOR_CFG"
          ./scripts/kconfig/merge_config.sh -O out -m arch/arm64/configs/gki_defconfig "$VENDOR_CFG"
          cp out/.config arch/arm64/configs/gki_defconfig
          rm out/.config
        else
          echo "No vendor defconfig at $VENDOR_CFG — skipping merge (OK for SM8750)"
        fi

    - name: Add Nethunter wireless drivers as modules
      shell: bash
      run: |
        set -euo pipefail
        cd "$MSM"
        ./scripts/config --file arch/arm64/configs/gki_defconfig \
          --enable CONFIG_CFG80211 \
          --enable CONFIG_MAC80211 \
          --enable CONFIG_WLAN_VENDOR_REALTEK \
          --enable CONFIG_WLAN_VENDOR_ATH \
          --module CONFIG_ATH_COMMON --module CONFIG_ATH9K --module CONFIG_ATH9K_HW \
          --module CONFIG_ATH9K_HTC --module CONFIG_ATH9K_COMMON \
          --module CONFIG_ATH10K --module CONFIG_ATH10K_USB --module CONFIG_ATH11K \
          --enable CONFIG_WLAN_VENDOR_MEDIATEK \
          --module CONFIG_MT7601U --module CONFIG_MT76_CORE --module CONFIG_MT76_USB \
          --module CONFIG_MT76x02_LIB --module CONFIG_MT76x02_USB \
          --module CONFIG_MT76_CONNAC_LIB --module CONFIG_MT7603E \
          --module CONFIG_MT76x2_COMMON --module CONFIG_MT76x0_COMMON \
          --module CONFIG_MT7615_COMMON --module CONFIG_MT7915E --module CONFIG_MT7921E \
          --module CONFIG_MAC80211_LEDS --module CONFIG_CAN_SLCAN
        echo "Nethunter wireless driver configs applied"

    - name: Add MemKernel module
      shell: bash
      run: |
        cd "$MSM"
        echo "Setting up MemKernel module..."
        curl -LSs "https://raw.githubusercontent.com/Poko-Apps/MemKernel/main/kernel/setup.sh" | bash -s M br0k3n || {
          echo "::warning::MemKernel setup failed — continuing without it"
        }

    - name: Add rtw88 external modules
      shell: bash
      run: |
        REALTEK_DIR="$MSM/drivers/net/wireless/realtek"
        if [ ! -d "$REALTEK_DIR" ]; then
          echo "::warning::$REALTEK_DIR not found, skipping rtw88"
        else
          cd "$REALTEK_DIR"
          rm -rf rtw88
          git clone --depth=1 https://github.com/lwfinger/rtw88.git || {
            echo "::warning::rtw88 clone failed, skipping"
            exit 0
          }
          if grep -q 'CONFIG_RTW88' Makefile 2>/dev/null; then
            sed -i 's/$(CONFIG_RTW88)/m/g' Makefile
          else
            echo 'obj-m += rtw88/' >> Makefile
          fi
          if [ -f Kconfig ]; then
            sed -i '/^source "drivers\/net\/wireless\/realtek\/rtw88\/Kconfig"/d' Kconfig || true
          fi
          echo "rtw88 hooked into build"
        fi

    - name: Detect Clang
      shell: bash
      run: |
        set -euo pipefail
        CLANG_FOUND=false
        for base in "$KERNEL_PLATFORM/prebuilts" "$KERNEL_PLATFORM/prebuilts-master"; do
          [ -d "$base/clang/host/linux-x86" ] || continue
          latest=$(ls -d "$base"/clang/host/linux-x86/clang-r*/ 2>/dev/null | sort -V | tail -n1 || true)
          if [ -n "$latest" ] && [ -x "$latest/bin/clang" ]; then
            CLANG_BIN="$latest/bin"; CLANG_FOUND=true
          fi
        done
        if ! $CLANG_FOUND && command -v clang >/dev/null 2>&1; then
          CLANG_BIN="$(dirname "$(command -v clang)")"; CLANG_FOUND=true
        fi
        $CLANG_FOUND || { echo "No clang toolchain found"; exit 1; }
        echo "CLANG_BIN_PATH=$CLANG_BIN" >> "$GITHUB_ENV"
        echo "Detected: $("$CLANG_BIN/clang" --version | head -1)"

    - name: Build Kernel Modules
      shell: bash
      run: |
        set -euo pipefail
        cd "$MSM"
        export PATH="${CLANG_BIN_PATH}:$PATH"
        export PATH="/usr/lib/ccache:$PATH"

        MAKE_FLAGS=(
          LLVM=1 LLVM_IAS=1 ARCH=arm64 SUBARCH=arm64
          LD=ld.lld HOSTLD=ld.lld AR=llvm-ar NM=llvm-nm
          OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump
          DEPMOD=depmod STRIP=llvm-strip
          HOSTCC=clang HOSTCXX=clang++ CC="ccache clang"
        )

        OUT="$MSM/out"
        INSTALL_MOD_PATH="$OUT"
        mkdir -p "$OUT"

        make "${MAKE_FLAGS[@]}" O="$OUT" gki_defconfig

        ./scripts/config --file "$OUT/.config" \
          --enable CONFIG_LTO_CLANG_THIN \
          --enable CONFIG_LTO_CLANG \
          --enable CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE \
          --disable CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE_O3

        echo "Building kernel modules with $(nproc --all) threads..."
        make "${MAKE_FLAGS[@]}" O="$OUT" olddefconfig
        make -j$(nproc --all) "${MAKE_FLAGS[@]}" O="$OUT" KCFLAGS="-Wno-error" modules
        make -j$(nproc --all) "${MAKE_FLAGS[@]}" O="$OUT" INSTALL_MOD_PATH="$INSTALL_MOD_PATH" modules_install

        echo "In-tree modules built."

        # --- Optional external vendor modules (only exist for SM8550 and older SoCs) ---
        cd "$KERNEL_PLATFORM"
        OPLUS_FLAGS=(CHIPSET_COMPANY=QCOM OPLUS_VND_BUILD_PLATFORM="$SOC")
        EXT_MAKE_FLAGS=("${MAKE_FLAGS[@]}" KERNEL_SRC="$MSM")

        OPLUS_MOD_LIST="$KERNEL_PLATFORM/oplus/config/modules.ext.${KERNEL_VER}.oplus"
        if [ -f "$OPLUS_MOD_LIST" ]; then
          echo "Building OPLUS ext modules..."
          while IFS= read -r MODULE; do
            [ -z "$MODULE" ] && continue
            MODULE_ABS="$KERNEL_PLATFORM/$MODULE"
            [ -d "$MODULE_ABS" ] || continue
            make -C "$MODULE_ABS" -j$(nproc --all) "${EXT_MAKE_FLAGS[@]}" O="$OUT" "${OPLUS_FLAGS[@]}" modules || true
            make -C "$MODULE_ABS" -j$(nproc --all) "${EXT_MAKE_FLAGS[@]}" O="$OUT" "${OPLUS_FLAGS[@]}" INSTALL_MOD_PATH="$INSTALL_MOD_PATH" modules_install || true
          done < "$OPLUS_MOD_LIST"
        else
          echo "No OPLUS ext module list — skipping (expected for SM8750)"
        fi

        EXT_QCOM=(
          ../vendor/qcom/opensource/mmrm-driver
          ../vendor/qcom/opensource/mm-drivers/hw_fence
          ../vendor/qcom/opensource/mm-drivers/sync_fence
          ../vendor/qcom/opensource/mm-drivers/msm_ext_display
          ../vendor/qcom/opensource/securemsm-kernel
          ../vendor/qcom/opensource/display-drivers/msm
          ../vendor/qcom/opensource/audio-kernel
          ../vendor/qcom/opensource/camera-kernel
          ../vendor/qcom/opensource/video-driver
          ../vendor/qcom/opensource/graphics-kernel
          ../vendor/qcom/opensource/dataipa/drivers/platform/msm
          ../vendor/qcom/opensource/datarmnet/core
          ../vendor/qcom/opensource/datarmnet-ext/aps
          ../vendor/qcom/opensource/datarmnet-ext/offload
          ../vendor/qcom/opensource/datarmnet-ext/shs
          ../vendor/qcom/opensource/datarmnet-ext/sch
          ../vendor/qcom/opensource/datarmnet-ext/perf
          ../vendor/qcom/opensource/datarmnet-ext/perf_tether
          ../vendor/qcom/opensource/datarmnet-ext/wlan
          ../vendor/qcom/opensource/eva-kernel
          ../vendor/qcom/opensource/wlan/platform
          ../vendor/qcom/opensource/bt-kernel
          ../vendor/qcom/opensource/wlan/qcacld-3.0
          ../vendor/oplus/kernel/explorer
          ../vendor/nxp/opensource/driver
          ../vendor/st/opensource/driver
          ../vendor/st/opensource/eSE-driver
        )

        QCOM_BUILT=0
        for MODULE in "${EXT_QCOM[@]}"; do
          MODULE_ABS="$(realpath "$KERNEL_PLATFORM/$MODULE" 2>/dev/null || true)"
          [ -n "$MODULE_ABS" ] && [ -d "$MODULE_ABS" ] || continue
          echo "  Building QCOM ext: $MODULE"
          make -C "$MODULE_ABS" -j$(nproc --all) "${EXT_MAKE_FLAGS[@]}" O="$OUT" "${OPLUS_FLAGS[@]}" modules || true
          make -C "$MODULE_ABS" -j$(nproc --all) "${EXT_MAKE_FLAGS[@]}" O="$OUT" "${OPLUS_FLAGS[@]}" INSTALL_MOD_PATH="$INSTALL_MOD_PATH" modules_install || true
          QCOM_BUILT=$((QCOM_BUILT+1))
        done
        [ "$QCOM_BUILT" -eq 0 ] && echo "No QCOM ext vendor modules found (expected for SM8750)" || true
        set -e  # restore errexit
        true  # ensure step exits 0

    - name: Collect and filter modules
      shell: bash
      run: |
        set -euo pipefail
        OUT="$MSM/out"
        UNAME=$(ls "$OUT/lib/modules/" 2>/dev/null | head -1)
        if [ -z "$UNAME" ]; then
          echo "ERROR: No modules dir under $OUT/lib/modules/"
          exit 1
        fi
        echo "Kernel uname: $UNAME"
        cd "$OUT"
        mkdir -p modules
        find lib/modules/"$UNAME" -type f -name '*.ko' -exec cp {} modules/ \;
        TOTAL=$(find modules -type f -name '*.ko' | wc -l)
        echo "Total .ko files: $TOTAL"
        [ "$TOTAL" -gt 0 ] || { echo "ERROR: No .ko files built"; exit 1; }
        cd modules
        if curl -L --fail --silent -o default_modules.txt \
          "https://raw.githubusercontent.com/nullptr-t-oss/kernel_patches/refs/heads/main/default_modules.txt"; then
          REMOVED=0
          while IFS= read -r module; do
            [ -n "$module" ] || continue
            if [ -e "$module" ]; then rm -f "$module"; REMOVED=$((REMOVED+1)); fi
          done < default_modules.txt
          echo "Excluded $REMOVED default modules"
        else
          echo "::warning::Could not fetch default_modules.txt — keeping all modules"
        fi
        cd ..
        echo "Final module count: $(find modules -type f -name '*.ko' | wc -l)"

    - name: Create Kernel Modules zip
      id: create_zip
      shell: bash
      run: |
        set -euo pipefail
        ARTIFACTS_DIR="$GITHUB_WORKSPACE/$CONFIG/artifacts"
        mkdir -p "$ARTIFACTS_DIR"
        MODULES_SRC="$MSM/out/modules"
        MODULES_ZIP="$ARTIFACTS_DIR/kernel_modules_${MODEL}.zip"
        KO_COUNT=$(find "$MODULES_SRC" -type f -name '*.ko' | wc -l)
        [ "$KO_COUNT" -gt 0 ] || { echo "ERROR: No modules to zip"; exit 1; }
        find "$MODULES_SRC" -type f -name '*.ko' -print0 | xargs -0 zip -j "$MODULES_ZIP"
        echo "Packaged $KO_COUNT modules → $(basename "$MODULES_ZIP")"
        echo "zip_name=$(basename "$MODULES_ZIP")" >> "$GITHUB_OUTPUT"

    - name: Final Build Summary
      shell: bash
      run: |
        {
          echo "### Kernel Modules Build Summary"
          echo "- Model: $MODEL"
          echo "- Kernel: $KERNEL_FULL_VER"
          echo "- Modules: $(find "$MSM/out/modules" -name '*.ko' 2>/dev/null | wc -l)"
          echo ""
          echo "CCache Statistics:"
          echo "$(ccache -s -v)"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Cleanup old ccache
      shell: bash
      run: |
        gh cache delete "ccache-${{ env.CONFIG }}-modules-${{ env.KERNEL_FULL_VER }}-" || true

    - name: Upload Kernel Modules zip
      if: success() && steps.create_zip.conclusion == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: kernel-modules-${{ env.CONFIG }}
        path: ${{ env.CONFIG }}/artifacts/
