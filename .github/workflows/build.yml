name: Build OnePlus 13 kernel

on:
  workflow_dispatch:
    inputs:
      base:
        description: OxygenOS source profile
        required: true
        default: oos16
        type: choice
        options:
          - oos16
          - oos15-global
          - oos15-cn
      root:
        description: Root implementation
        required: true
        default: kernelsu-next
        type: choice
        options:
          - kernelsu-next
          - kernelsu
          - none
      kernelsu_commit:
        description: Optional full SHA assertion for the selected KernelSU lock
        required: false
        default: ""
        type: string
      susfs_commit:
        description: Optional full SHA assertion for the SUSFS lock
        required: false
        default: ""
        type: string
      profile:
        description: Feature profile
        required: true
        default: full
        type: choice
        options:
          - full
          - wild
          - nethunter
      target:
        description: Build output set
        required: true
        default: mixed
        type: choice
        options:
          - kernel
          - modules
          - mixed
      optimization:
        description: Compiler optimization level
        required: true
        default: O2
        type: choice
        options:
          - O2
          - O3
      lto:
        description: Link-time optimization mode
        required: true
        default: thin
        type: choice
        options:
          - thin
          - full
      clean:
        description: Discard prior local build output
        required: true
        default: true
        type: boolean
      cache:
        description: Restore verified dependencies and the audited Bazel cache when clean is false
        required: true
        default: true
        type: boolean
      debug:
        description: Preserve verbose logs and symbols
        required: true
        default: false
        type: boolean
      pre_release:
        description: Mark packages as pre-release output
        required: true
        default: true
        type: boolean
  workflow_call:
    inputs:
      base:
        required: true
        type: string
      root:
        required: true
        type: string
      kernelsu_commit:
        required: false
        default: ""
        type: string
      susfs_commit:
        required: false
        default: ""
        type: string
      profile:
        required: true
        type: string
      target:
        required: true
        type: string
      optimization:
        required: true
        type: string
      lto:
        required: true
        type: string
      clean:
        required: true
        type: boolean
      cache:
        required: false
        default: true
        type: boolean
      debug:
        required: true
        type: boolean
      pre_release:
        required: true
        type: boolean
      kernel_artifact_run_id:
        required: false
        default: ""
        type: string
      branding:
        required: false
        default: ""
        type: string
      build_timestamp:
        required: false
        default: ""
        type: string
      artifact_retention_days:
        required: false
        default: 7
        type: number
    outputs:
      package_artifact:
        description: Name of the packaged build artifact
        value: ${{ jobs.build.outputs.package_artifact }}
      package_artifact_id:
        description: Immutable GitHub ID of the packaged build artifact
        value: ${{ jobs.build.outputs.package_artifact_id }}
      package_artifact_digest:
        description: SHA-256 digest of the packaged build artifact archive
        value: ${{ jobs.build.outputs.package_artifact_digest }}
      kernel_artifact:
        description: Name of the reusable kernel build artifact
        value: ${{ jobs.build.outputs.kernel_artifact }}

permissions:
  actions: read
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}-${{ inputs.base }}-${{ inputs.root }}-${{ inputs.profile }}-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ inputs.base }} / ${{ inputs.root }} / ${{ inputs.profile }} / ${{ inputs.target }}
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    outputs:
      package_artifact: ${{ steps.artifact-names.outputs.package }}
      package_artifact_id: ${{ steps.upload-packages.outputs.artifact-id }}
      package_artifact_digest: ${{ steps.upload-packages.outputs.artifact-digest }}
      kernel_artifact: ${{ steps.artifact-names.outputs.kernel }}
    defaults:
      run:
        shell: bash
    env:
      BASE: ${{ inputs.base }}
      ROOT_VARIANT: ${{ inputs.root }}
      REQUESTED_KERNELSU_COMMIT: ${{ inputs.kernelsu_commit }}
      REQUESTED_SUSFS_COMMIT: ${{ inputs.susfs_commit }}
      PROFILE: ${{ inputs.profile }}
      BUILD_TARGET: ${{ inputs.target }}
      OPTIMIZATION: ${{ inputs.optimization }}
      LTO_MODE: ${{ inputs.lto }}
      CLEAN_BUILD: ${{ inputs.clean }}
      DEBUG_BUILD: ${{ inputs.debug }}
      PRE_RELEASE: ${{ inputs.pre_release }}
      CACHE_ENABLED: ${{ inputs.cache }}
      COMPILE_CACHE_MAX_BYTES: ${{ vars.OP13_COMPILE_CACHE_MAX_BYTES || '7516192768' }}
      ARTIFACT_RETENTION_DAYS: ${{ inputs.artifact_retention_days || 7 }}
      CALL_KERNEL_ARTIFACT_RUN_ID: ${{ inputs.kernel_artifact_run_id || vars.KERNEL_ARTIFACT_RUN_ID || '' }}
      CALL_KERNEL_BRANDING: ${{ inputs.branding || vars.KERNEL_BRANDING || 'OnePlus13-KernelBuilder' }}
      CALL_BUILD_TIMESTAMP: ${{ inputs.build_timestamp || vars.BUILD_TIMESTAMP || '' }}
      SOURCE_DIR: out/source
      BUILD_DIR: out/build
      MODULE_DIR: out/build/modules
      DIST_DIR: out/dist
      DEBUG_DIR: out/debug
      KERNEL_ARTIFACT_DIR: out/kernel-artifact
      KERNEL_ARTIFACT_DOWNLOAD_DIR: out/kernel-artifact-download
    steps:
      - name: Reclaim allowlisted runner tools before pooling disks
        id: prepare-storage
        run: |
          set -euo pipefail
          if [[ ! -d "$RUNNER_TEMP" || -L "$RUNNER_TEMP" ]]; then
            echo "runner temporary directory is unavailable or is a symlink" >&2
            exit 2
          fi
          runner_temp_root=$(realpath -e -- "$RUNNER_TEMP")
          preparation_dir="$runner_temp_root/op13-pre-lvm"
          if [[ -e "$preparation_dir" || -L "$preparation_dir" ]]; then
            echo "pre-LVM evidence directory already exists: $preparation_dir" >&2
            exit 2
          fi
          install -d -m 0700 -- "$preparation_dir"
          cleanup_log="$preparation_dir/disk-cleanup.txt"
          : > "$cleanup_log"
          if [[ ! -d /mnt || -L /mnt || "$(realpath -e -- /mnt)" != /mnt ]]; then
            echo "/mnt is unavailable, is a symlink, or resolves unexpectedly" >&2
            exit 2
          fi
          root_device=$(stat -c %d -- /)
          temp_device=$(stat -c %d -- /mnt)
          if [[ "$root_device" == "$temp_device" ]]; then
            storage_mode=shared
            root_reserve_mb=9472
            temp_reserve_mb=8448
          else
            storage_mode=dual
            root_reserve_mb=8448
            temp_reserve_mb=1024
          fi
          {
            echo "storage_mode=$storage_mode"
            echo "root_reserve_mb=$root_reserve_mb"
            echo "temp_reserve_mb=$temp_reserve_mb"
          } >> "$GITHUB_OUTPUT"
          df -h / /mnt > "$preparation_dir/disk-before-cleanup.txt"
          before_available=$(df --output=avail -B1 / | tail -n 1 | tr -d ' ')
          cleanup_paths=(
            /usr/local/lib/android
            /usr/share/dotnet
            /opt/ghc
            /usr/local/.ghcup
            /usr/share/swift
            /usr/local/swift
            /opt/hostedtoolcache
            /usr/local/share/powershell
            /usr/local/share/vcpkg
          )
          for candidate in "${cleanup_paths[@]}"; do
            if [[ ! -e "$candidate" && ! -L "$candidate" ]]; then
              printf 'absent\t%s\n' "$candidate" >> "$cleanup_log"
              continue
            fi
            if [[ -L "$candidate" ]]; then
              printf 'skipped-symlink\t%s\t%s\n' "$candidate" "$(readlink -- "$candidate")" \
                >> "$cleanup_log"
              continue
            fi
            resolved=$(realpath -e -- "$candidate")
            if [[ "$resolved" != "$candidate" ]]; then
              echo "cleanup path resolved outside its explicit allowlist entry: $candidate -> $resolved" >&2
              exit 2
            fi
            if [[ "$(stat -c %d -- "$resolved")" != "$root_device" ]] || \
                mountpoint -q -- "$resolved"; then
              echo "cleanup path is not an ordinary root-filesystem directory: $resolved" >&2
              exit 2
            fi
            size=$(sudo du -sh -- "$resolved" 2>/dev/null | cut -f 1 || true)
            printf 'remove\t%s\t%s\n' "${size:-unknown}" "$resolved" >> "$cleanup_log"
            sudo rm -rf --one-file-system -- "$resolved"
          done
          if command -v docker >/dev/null 2>&1; then
            docker image prune --all --force >> "$cleanup_log" 2>&1 || true
          fi
          if [[ -e /swapfile || -L /swapfile ]]; then
            if [[ -L /swapfile || ! -f /swapfile ||
                  "$(realpath -e -- /swapfile)" != /swapfile ||
                  "$(stat -c %d -- /swapfile)" != "$root_device" ]]; then
              echo "root swap file is not an ordinary root-filesystem file" >&2
              exit 2
            fi
            if ! sudo swapon --show=NAME --noheadings | awk '{$1=$1; print}' |
                grep -F -x -q -- /swapfile; then
              echo "root swap file exists but is not the active runner swap" >&2
              exit 2
            fi
            swap_size=$(sudo du -sh -- /swapfile 2>/dev/null | cut -f 1 || true)
            printf 'remove-swap\t%s\t/swapfile\n' "${swap_size:-unknown}" >> "$cleanup_log"
            sudo swapoff -- /swapfile
            sudo rm -f -- /swapfile
          fi
          after_available=$(df --output=avail -B1 / | tail -n 1 | tr -d ' ')
          df -h / /mnt > "$preparation_dir/disk-after-cleanup.txt"
          reclaimed=$((after_available - before_available))
          {
            echo "root_device=$root_device"
            echo "temp_device=$temp_device"
            echo "storage_mode=$storage_mode"
            echo "root_reserve_mb=$root_reserve_mb"
            echo "temp_reserve_mb=$temp_reserve_mb"
            echo "root_available_before_bytes=$before_available"
            echo "root_available_after_bytes=$after_available"
            echo "root_reclaimed_bytes=$reclaimed"
          } > "$preparation_dir/preparation.properties"
          {
            echo '## Hosted-runner pre-LVM cleanup'
            echo
            echo "- Root available before cleanup: ${before_available} bytes"
            echo "- Root available after cleanup: ${after_available} bytes"
            echo "- Net reclaimed: ${reclaimed} bytes"
            echo "- Storage topology: ${storage_mode}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Pool root and temporary disks for the build workspace
        uses: easimon/maximize-build-space@c28619d8999a147d5e09c1199f84ff6af6ad5794 # pinned 2025-03-28
        with:
          root-reserve-mb: ${{ steps.prepare-storage.outputs.root_reserve_mb }}
          temp-reserve-mb: ${{ steps.prepare-storage.outputs.temp_reserve_mb }}
          swap-size-mb: 4096
          overprovision-lvm: 'false'
          build-mount-path: ${{ github.workspace }}
          build-mount-path-ownership: runner:runner
          pv-loop-path: /pv.img
          tmp-pv-loop-path: /mnt/tmp-pv.img
          remove-dotnet: 'false'
          remove-android: 'false'
          remove-haskell: 'false'
          remove-codeql: 'false'
          remove-docker-images: 'false'

      - name: Capture failed pre-LVM setup state
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -d "$RUNNER_TEMP" || -L "$RUNNER_TEMP" ]]; then
            echo "runner temporary directory is unavailable or is a symlink" >&2
            exit 2
          fi
          runner_temp_root=$(realpath -e -- "$RUNNER_TEMP")
          failure_dir="$runner_temp_root/op13-lvm-failure"
          if [[ -e "$failure_dir" || -L "$failure_dir" ]]; then
            echo "LVM failure evidence directory already exists: $failure_dir" >&2
            exit 2
          fi
          install -d -m 0700 -- "$failure_dir"
          preparation_dir="$runner_temp_root/op13-pre-lvm"
          if [[ -d "$preparation_dir" && ! -L "$preparation_dir" &&
                "$(realpath -e -- "$preparation_dir")" == "$preparation_dir" ]]; then
            cp -a -- "$preparation_dir/." "$failure_dir/"
          fi
          {
            echo '--- filesystems ---'
            df -h || true
            echo '--- mounts ---'
            findmnt || true
            echo '--- loop devices ---'
            sudo losetup --list || true
            echo '--- physical volumes ---'
            sudo pvs || true
            echo '--- logical volumes ---'
            sudo lvs || true
            echo '--- swap ---'
            sudo swapon --show || true
          } > "$failure_dir/setup-failure-state.txt" 2>&1

      - name: Preserve failed pre-LVM setup evidence
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pre-lvm-${{ inputs.base }}-${{ inputs.root }}-${{ github.run_id }}
          path: ${{ runner.temp }}/op13-lvm-failure
          if-no-files-found: warn
          retention-days: 7

      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Validate pooled build filesystem
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/validate-runner-storage.sh \
            --debug-dir "$DEBUG_DIR" \
            --summary-title 'Hosted-runner pooled build filesystem'

      - name: Validate inputs and runner tools
        id: validated-inputs
        run: |
          set -euo pipefail
          case "$BASE" in oos16|oos15-global|oos15-cn) ;; *) exit 2 ;; esac
          case "$ROOT_VARIANT" in kernelsu-next|kernelsu|none) ;; *) exit 2 ;; esac
          case "$PROFILE" in full|wild|nethunter) ;; *) exit 2 ;; esac
          case "$BUILD_TARGET" in kernel|modules|mixed) ;; *) exit 2 ;; esac
          case "$OPTIMIZATION" in O2|O3) ;; *) exit 2 ;; esac
          case "$LTO_MODE" in thin|full) ;; *) exit 2 ;; esac
          mkdir -p "$SOURCE_DIR" "$BUILD_DIR" "$MODULE_DIR" "$DIST_DIR" "$DEBUG_DIR"
          python3 scripts/op13.py resolve-root-lock \
            --root "$ROOT_VARIANT" \
            --kernelsu-commit "$REQUESTED_KERNELSU_COMMIT" \
            --susfs-commit "$REQUESTED_SUSFS_COMMIT" \
            > "$DEBUG_DIR/root-selection.json"
          if [[ ! "$ARTIFACT_RETENTION_DAYS" =~ ^([1-9]|[1-8][0-9]|90)$ ]]; then
            echo "artifact retention must be an integer from 1 through 90 days" >&2
            exit 2
          fi
          if [[ ! "$COMPILE_CACHE_MAX_BYTES" =~ ^[1-9][0-9]*$ ]]; then
            echo "OP13_COMPILE_CACHE_MAX_BYTES must be a positive decimal byte count" >&2
            exit 2
          fi
          kernel_artifact_run_id=$CALL_KERNEL_ARTIFACT_RUN_ID
          kernel_branding=$CALL_KERNEL_BRANDING
          build_timestamp=$CALL_BUILD_TIMESTAMP
          if [[ -n "$kernel_artifact_run_id" && ! "$kernel_artifact_run_id" =~ ^[0-9]+$ ]]; then
            echo "kernel artifact run ID must be numeric" >&2
            exit 2
          fi
          if [[ "$kernel_artifact_run_id" == *$'\n'* || "$kernel_artifact_run_id" == *$'\r'* ||
                "$kernel_branding" == *$'\n'* || "$kernel_branding" == *$'\r'* ||
                "$build_timestamp" == *$'\n'* || "$build_timestamp" == *$'\r'* ]]; then
            echo "build metadata values must be single-line strings" >&2
            exit 2
          fi
          if [[ ! "$kernel_branding" =~ ^[A-Za-z0-9][A-Za-z0-9._+-]{0,63}$ ]]; then
            echo "branding must contain only letters, digits, dot, underscore, plus, or hyphen" >&2
            exit 2
          fi
          {
            echo "kernel_artifact_run_id=$kernel_artifact_run_id"
            echo "kernel_branding=$kernel_branding"
            echo "build_timestamp=$build_timestamp"
          } >> "$GITHUB_OUTPUT"
          {
            echo "KERNEL_ARTIFACT_RUN_ID=$kernel_artifact_run_id"
            echo "KERNEL_BRANDING=$kernel_branding"
            echo "BUILD_TIMESTAMP=$build_timestamp"
          } >> "$GITHUB_ENV"
          python3 --version
          jq --version
          df -h > "$DEBUG_DIR/disk-before.txt"
          {
            echo "cache_enabled=$CACHE_ENABLED"
            echo "clean_build=$CLEAN_BUILD"
            echo "compile_cache_max_bytes=$COMPILE_CACHE_MAX_BYTES"
            echo 'dependency_cache_scope=verified dependency sources'
            echo 'compile_cache_scope=official device Bazel cache only'
            echo 'kernel_lineage=versioned artifact only'
          } > "$DEBUG_DIR/cache-statistics.txt"

      - name: Resolve artifact names
        id: artifact-names
        run: |
          set -euo pipefail
          timestamp_record=$(
            python3 scripts/kernel-artifact-bundle.py timestamp-key \
              --build-timestamp "$BUILD_TIMESTAMP"
          )
          timestamp_key=$(jq -er '.artifact_key' <<< "$timestamp_record")
          if [[ "$timestamp_key" != default &&
                ! "$timestamp_key" =~ ^[0-9a-f]{64}$ ]]; then
            echo "timestamp artifact identity is not canonical" >&2
            exit 2
          fi
          kernel_target=$BUILD_TARGET
          if [[ "$kernel_target" == modules ]]; then
            # Modules use the same fragment scope as a mixed build.  A
            # kernel-only target intentionally omits module-scope fragments
            # and therefore is not a compatible prerequisite.
            kernel_target=mixed
          fi
          {
            echo "timestamp_key=$timestamp_key"
            echo "kernel=kernel-build-${BASE}-${ROOT_VARIANT}-${PROFILE}-${kernel_target}-${OPTIMIZATION}-${LTO_MODE}-${KERNEL_BRANDING}-timestamp-${timestamp_key}"
            echo "package=packages-${BASE}-${ROOT_VARIANT}-${PROFILE}-${BUILD_TARGET}-${OPTIMIZATION}-${LTO_MODE}-${KERNEL_BRANDING}-timestamp-${timestamp_key}"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve audited compile cache identity
        id: compile-cache-identity
        env:
          COMPILE_CACHE_INPUT_HASH: ${{ hashFiles('manifests/lockfiles/**', 'dependencies/lock.yml', 'configs/**', 'schemas/**', 'patches/**', 'scripts/**') }}
          RUNNER_OS_NAME: ${{ runner.os }}
          RUNNER_ARCH_NAME: ${{ runner.arch }}
        run: |
          set -euo pipefail
          if [[ ! "$COMPILE_CACHE_INPUT_HASH" =~ ^[0-9a-f]{64}$ ]]; then
            echo "canonical compile-cache input hash is missing" >&2
            exit 2
          fi
          cache_dir=$(jq -er '.official_build.cache_dir | select(type == "string")' \
            configs/devices/oneplus13.yml)
          if [[ ! "$cache_dir" =~ ^[A-Za-z0-9._-]+(/[A-Za-z0-9._-]+)*$ ]]; then
            echo "official build cache directory is not kernel-platform-relative" >&2
            exit 2
          fi
          IFS=/ read -r -a cache_parts <<< "$cache_dir"
          for cache_part in "${cache_parts[@]}"; do
            if [[ "$cache_part" == "." || "$cache_part" == ".." ]]; then
              echo "official build cache directory contains a traversal segment" >&2
              exit 2
            fi
          done
          cache_path="$SOURCE_DIR/kernel_platform/$cache_dir"
          restore_prefix="op13-bazel-v1-${RUNNER_OS_NAME}-${RUNNER_ARCH_NAME}-${BASE}-${ROOT_VARIANT}-${PROFILE}-${OPTIMIZATION}-${LTO_MODE}-"
          cache_key="${restore_prefix}${COMPILE_CACHE_INPUT_HASH}"
          {
            echo "path=$cache_path"
            echo "relative=$cache_dir"
            echo "key=$cache_key"
            echo "restore-prefix=$restore_prefix"
          } >> "$GITHUB_OUTPUT"
          {
            echo "compile_cache_path=$cache_path"
            echo "compile_cache_input_hash=$COMPILE_CACHE_INPUT_HASH"
            echo "compile_cache_key=$cache_key"
            echo "compile_cache_restore_prefix=$restore_prefix"
          } >> "$DEBUG_DIR/cache-statistics.txt"

      - name: Restore verified dependency-source cache
        id: dependency-cache
        if: inputs.cache && !inputs.clean
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .cache/op13
          key: op13-dependencies-v2-${{ runner.os }}-${{ hashFiles('dependencies/lock.yml') }}-${{ hashFiles(format('configs/profiles/{0}.yml', inputs.base)) }}-${{ hashFiles(format('configs/features/{0}.yml', inputs.profile)) }}-${{ inputs.base }}-${{ inputs.root }}-${{ inputs.profile }}

      - name: Record dependency cache result
        if: always()
        env:
          CACHE_HIT: ${{ steps.dependency-cache.outputs.cache-hit }}
          CACHE_KEY: op13-dependencies-v2-${{ runner.os }}-${{ hashFiles('dependencies/lock.yml') }}-${{ hashFiles(format('configs/profiles/{0}.yml', inputs.base)) }}-${{ hashFiles(format('configs/features/{0}.yml', inputs.profile)) }}-${{ inputs.base }}-${{ inputs.root }}-${{ inputs.profile }}
        run: |
          set -euo pipefail
          mkdir -p "$DEBUG_DIR"
          {
            echo "dependency_cache_hit=${CACHE_HIT:-skipped}"
            echo "dependency_cache_key=$CACHE_KEY"
          } >> "$DEBUG_DIR/cache-statistics.txt"

      - name: Resolve modules-only kernel artifact
        id: kernel-artifact
        if: inputs.target == 'modules'
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED_RUN_ID: ${{ steps.validated-inputs.outputs.kernel_artifact_run_id }}
          ARTIFACT_NAME: ${{ steps.artifact-names.outputs.kernel }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          artifact_pages=$(mktemp "$RUNNER_TEMP/op13-kernel-artifact-pages.XXXXXX.json")
          artifact_index=$(mktemp "$RUNNER_TEMP/op13-kernel-artifacts.XXXXXX.json")
          run_response=$(mktemp "$RUNNER_TEMP/op13-kernel-run.XXXXXX.json")
          trap 'rm -f -- "$artifact_pages" "$artifact_index" "$run_response"' EXIT
          gh api --method GET --paginate --slurp \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "/repos/${GITHUB_REPOSITORY}/actions/artifacts" \
            -f name="$ARTIFACT_NAME" \
            -F per_page=100 > "$artifact_pages"
          jq -e \
            'type == "array" and all(.[]; (.artifacts | type) == "array")' \
            "$artifact_pages" > /dev/null
          jq -c '[.[].artifacts[]]' "$artifact_pages" > "$artifact_index"
          jq -e \
            --arg name "$ARTIFACT_NAME" '
              type == "array" and
              all(
                .[] | select(.name == $name and .expired == false);
                (.id | type) == "number" and
                (.created_at | type) == "string" and
                (.workflow_run | type) == "object" and
                (.workflow_run.id | type) == "number" and
                (.workflow_run.head_sha | type) == "string" and
                (.workflow_run.repository_id | type) == "number" and
                (.workflow_run.head_repository_id | type) == "number"
              )
            ' "$artifact_index" > /dev/null
          mapfile -t candidate_artifacts < <(jq -r \
            --arg name "$ARTIFACT_NAME" \
            --arg sha "$CURRENT_SHA" \
            --arg requested "$REQUESTED_RUN_ID" '
              [.[]
                | select(
                    .name == $name and
                    .expired == false and
                    .workflow_run != null and
                    .workflow_run.head_sha == $sha and
                    (.workflow_run.repository_id | tostring) == env.GITHUB_REPOSITORY_ID and
                    (.workflow_run.head_repository_id | tostring) == env.GITHUB_REPOSITORY_ID and
                    ($requested == "" or (.workflow_run.id | tostring) == $requested)
                  )]
              | sort_by([.created_at, .id]) | reverse
              | .[] | [.id, .workflow_run.id] | @tsv
            ' "$artifact_index")
          if ((${#candidate_artifacts[@]} == 0)); then
            echo "no unexpired ${ARTIFACT_NAME} artifact was found for ${CURRENT_SHA}; run a matching mixed build first" >&2
            exit 2
          fi
          declare -A candidate_runs_seen=()
          selected_artifact_id=
          selected_run_id=
          selected_run_attempt=
          for candidate_artifact in "${candidate_artifacts[@]}"; do
            IFS=$'\t' read -r candidate_artifact_id candidate_run_id extra \
              <<< "$candidate_artifact"
            if [[ -n "$extra" ||
                  ! "$candidate_artifact_id" =~ ^[1-9][0-9]*$ ||
                  ! "$candidate_run_id" =~ ^[1-9][0-9]*$ ]]; then
              echo "artifact index returned a non-canonical artifact identity" >&2
              exit 2
            fi
            if [[ -n "${candidate_runs_seen[$candidate_run_id]:-}" ]]; then
              echo "more than one unexpired exact-name artifact exists for run ${candidate_run_id}" >&2
              exit 2
            fi
            candidate_runs_seen[$candidate_run_id]=1
            gh api --method GET \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "/repos/${GITHUB_REPOSITORY}/actions/runs/${candidate_run_id}" \
              > "$run_response"
            verify_args=(
              --run-json "$run_response"
              --repository "$GITHUB_REPOSITORY"
              --repository-id "$GITHUB_REPOSITORY_ID"
              --head-sha "$CURRENT_SHA"
              --run-id "$candidate_run_id"
              --current-run-id "$GITHUB_RUN_ID"
            )
            if [[ -n "$REQUESTED_RUN_ID" ]]; then
              verify_args+=(--requested-run-id "$REQUESTED_RUN_ID")
            fi
            if trusted_run=$(
              python3 scripts/kernel-artifact-bundle.py verify-run "${verify_args[@]}"
            ); then
              selected_artifact_id=$candidate_artifact_id
              selected_run_id=$candidate_run_id
              selected_run_attempt=$(jq -er '.run_attempt' <<< "$trusted_run")
              break
            fi
          done
          if [[ ! "$selected_artifact_id" =~ ^[1-9][0-9]*$ ||
                ! "$selected_run_id" =~ ^[1-9][0-9]*$ ||
                ! "$selected_run_attempt" =~ ^[1-9][0-9]*$ ]]; then
            echo "no artifact came from an allowed successful workflow run" >&2
            exit 2
          fi
          {
            echo "artifact_id=$selected_artifact_id"
            echo "run_id=$selected_run_id"
            echo "run_attempt=$selected_run_attempt"
          } >> "$GITHUB_OUTPUT"

      - name: Download matching kernel artifact
        if: inputs.target == 'modules'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ steps.kernel-artifact.outputs.artifact_id }}
          path: out/kernel-artifact-download
          run-id: ${{ steps.kernel-artifact.outputs.run_id }}
          repository: ${{ github.repository }}
          github-token: ${{ github.token }}
          digest-mismatch: error

      - name: Restore reusable kernel output
        if: inputs.target == 'modules'
        env:
          ARTIFACT_NAME: ${{ steps.artifact-names.outputs.kernel }}
          SOURCE_RUN_ID: ${{ steps.kernel-artifact.outputs.run_id }}
          SOURCE_RUN_ATTEMPT: ${{ steps.kernel-artifact.outputs.run_attempt }}
        run: |
          set -euo pipefail
          bundle_args=(
            --directory "$KERNEL_ARTIFACT_DOWNLOAD_DIR"
            --repository "$GITHUB_REPOSITORY"
            --head-sha "$GITHUB_SHA"
            --run-id "$SOURCE_RUN_ID"
            --run-attempt "$SOURCE_RUN_ATTEMPT"
            --artifact-name "$ARTIFACT_NAME"
            --base "$BASE"
            --root "$ROOT_VARIANT"
            --profile "$PROFILE"
            --optimization "$OPTIMIZATION"
            --lto "$LTO_MODE"
            --branding "$KERNEL_BRANDING"
            --build-timestamp "$BUILD_TIMESTAMP"
            --allow-earlier-run-attempt
          )
          python3 scripts/kernel-artifact-bundle.py verify "${bundle_args[@]}" \
            > "$DEBUG_DIR/kernel-artifact-bundle-pre-restore.json"
          workspace_root=$(realpath -e -- "$GITHUB_WORKSPACE")
          build_root=$(realpath -e -- "$BUILD_DIR")
          if [[ -L "$BUILD_DIR" || "$build_root" != "$workspace_root/out/build" ]]; then
            echo "precreated build directory resolved outside the exact workspace path" >&2
            exit 2
          fi
          mapfile -d '' build_entries < <(
            find "$build_root" -mindepth 1 -maxdepth 1 -print0
          )
          if ((${#build_entries[@]} != 1)) ||
             [[ "${build_entries[0]}" != "$build_root/modules" ]]; then
            echo "precreated build directory must contain only its modules directory" >&2
            exit 2
          fi
          module_root=$(realpath -e -- "$MODULE_DIR")
          if [[ -L "$MODULE_DIR" || "$module_root" != "$workspace_root/out/build/modules" ||
                -n "$(find "$module_root" -mindepth 1 -print -quit)" ]]; then
            echo "precreated modules directory is not the exact empty workspace path" >&2
            exit 2
          fi
          rmdir -- "$module_root"
          rmdir -- "$build_root"
          python3 scripts/kernel-artifact-archive.py restore \
            --archive "$KERNEL_ARTIFACT_DOWNLOAD_DIR/kernel-build.tar.zst" \
            --manifest "$KERNEL_ARTIFACT_DOWNLOAD_DIR/KERNEL-ARTIFACT-MANIFEST.json" \
            --destination "$BUILD_DIR" > /dev/null
          test -s "$BUILD_DIR/.config"
          test -s "$BUILD_DIR/Module.symvers"
          test -s "$BUILD_DIR/System.map"
          test -s "$BUILD_DIR/.op13/build-context.json"
          python3 scripts/kernel-artifact-bundle.py verify "${bundle_args[@]}" \
            --restored-dir "$BUILD_DIR" \
            > "$DEBUG_DIR/kernel-artifact-bundle-restored.json"
          cp -- "$KERNEL_ARTIFACT_DOWNLOAD_DIR/KERNEL-ARTIFACT-PROVENANCE.json" \
            "$DEBUG_DIR/kernel-artifact-provenance.json"
          rm -- \
            "$KERNEL_ARTIFACT_DOWNLOAD_DIR/kernel-build.tar.zst" \
            "$KERNEL_ARTIFACT_DOWNLOAD_DIR/KERNEL-ARTIFACT-MANIFEST.json" \
            "$KERNEL_ARTIFACT_DOWNLOAD_DIR/KERNEL-ARTIFACT-PROVENANCE.json" \
            "$KERNEL_ARTIFACT_DOWNLOAD_DIR/SHA256SUMS"
          download_root=$(realpath -e -- "$KERNEL_ARTIFACT_DOWNLOAD_DIR")
          if [[ -L "$KERNEL_ARTIFACT_DOWNLOAD_DIR" ||
                "$download_root" != "$workspace_root/out/kernel-artifact-download" ]]; then
            echo "artifact download directory resolved outside the exact workspace path" >&2
            exit 2
          fi
          rmdir -- "$download_root"

      - name: Synchronize locked sources
        run: |
          set -euo pipefail
          bash scripts/run-hosted-source-sync.sh \
            --base "$BASE" \
            --output "$SOURCE_DIR" \
            --debug-dir "$DEBUG_DIR"

      - name: Verify and record pinned build toolchain
        run: |
          set -euo pipefail
          python3 scripts/record-build-toolchain.py \
            --source-dir "$SOURCE_DIR" \
            --resolved-manifest "$SOURCE_DIR/.op13/${BASE}-manifest-resolved.xml" \
            --output "$DEBUG_DIR/build-toolchain-provenance.json" \
            --output "$SOURCE_DIR/.op13/build-toolchain-provenance.json"

      - name: Validate compile cache filesystem path
        if: inputs.cache && !inputs.clean && inputs.target != 'modules'
        env:
          CACHE_PATH: ${{ steps.compile-cache-identity.outputs.path }}
          CACHE_RELATIVE: ${{ steps.compile-cache-identity.outputs.relative }}
        run: |
          set -euo pipefail
          kernel_platform="$SOURCE_DIR/kernel_platform"
          test -d "$kernel_platform"
          current=$kernel_platform
          if [[ -L "$current" ]]; then
            echo "kernel_platform must not be a symlink when using compile cache" >&2
            exit 2
          fi
          IFS=/ read -r -a cache_parts <<< "$CACHE_RELATIVE"
          for cache_part in "${cache_parts[@]}"; do
            current="$current/$cache_part"
            if [[ -L "$current" ]]; then
              echo "compile cache path contains a symlink component: $current" >&2
              exit 2
            fi
          done
          resolved_base=$(realpath -e -- "$kernel_platform")
          resolved_cache=$(realpath -m -- "$CACHE_PATH")
          case "$resolved_cache" in
            "$resolved_base"/*) ;;
            *)
              echo "compile cache path escapes kernel_platform" >&2
              exit 2
              ;;
          esac

      - name: Restore audited Bazel compile cache
        id: compile-cache-restore
        if: inputs.cache && !inputs.clean && inputs.target != 'modules'
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.compile-cache-identity.outputs.path }}
          key: ${{ steps.compile-cache-identity.outputs.key }}
          restore-keys: |
            ${{ steps.compile-cache-identity.outputs.restore-prefix }}

      - name: Record compile cache restore and pre-build size
        if: always()
        env:
          CACHE_ACTIVE: ${{ inputs.cache && !inputs.clean && inputs.target != 'modules' }}
          CACHE_HIT: ${{ steps.compile-cache-restore.outputs.cache-hit }}
          CACHE_OUTCOME: ${{ steps.compile-cache-restore.outcome }}
          CACHE_PRIMARY_KEY: ${{ steps.compile-cache-restore.outputs.cache-primary-key }}
          CACHE_MATCHED_KEY: ${{ steps.compile-cache-restore.outputs.cache-matched-key }}
          CACHE_PATH: ${{ steps.compile-cache-identity.outputs.path }}
        run: |
          set -euo pipefail
          mkdir -p "$DEBUG_DIR"
          cache_bytes=0
          cache_human=absent
          if [[ -d "$CACHE_PATH" ]]; then
            cache_bytes=$(du --summarize --bytes -- "$CACHE_PATH" | cut -f1)
            cache_human=$(du -sh -- "$CACHE_PATH" | cut -f1)
          fi
          {
            echo "compile_cache_active=$CACHE_ACTIVE"
            echo "compile_cache_restore_outcome=${CACHE_OUTCOME:-skipped}"
            echo "compile_cache_restore_hit=${CACHE_HIT:-skipped}"
            echo "compile_cache_restore_primary_key=${CACHE_PRIMARY_KEY:-none}"
            echo "compile_cache_restore_matched_key=${CACHE_MATCHED_KEY:-none}"
            echo "compile_cache_pre_bytes=$cache_bytes"
            echo "compile_cache_pre_human=$cache_human"
          } >> "$DEBUG_DIR/cache-statistics.txt"

      - name: Record locked source footprint
        if: always()
        run: |
          set -uo pipefail
          mkdir -p "$DEBUG_DIR"
          df -h / "$GITHUB_WORKSPACE" > "$DEBUG_DIR/disk-after-source-sync.txt"
          du -sh "$SOURCE_DIR" > "$DEBUG_DIR/source-size.txt" 2>&1 || true
          {
            echo '## Locked source footprint'
            echo
            echo '```text'
            cat "$DEBUG_DIR/source-size.txt"
            df -h / "$GITHUB_WORKSPACE"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Apply selected patch series
        id: apply_patches
        run: |
          set -euo pipefail
          bash scripts/apply-series.sh \
            --base "$BASE" \
            --profile "$PROFILE" \
            --root "$ROOT_VARIANT" \
            --source-dir "$SOURCE_DIR" \
            --log "$DEBUG_DIR"

      - name: Collect patch residue evidence
        if: always() && steps.apply_patches.outcome != 'skipped'
        run: |
          set -euo pipefail
          python3 scripts/collect-patch-evidence.py \
            --source-dir "$SOURCE_DIR" \
            --output-dir "$DEBUG_DIR"

      - name: Capture validated KMI patch evidence
        run: |
          set -euo pipefail
          python3 scripts/capture-kmi-build-evidence.py \
            --source-dir "$SOURCE_DIR" \
            --context "$SOURCE_DIR/.op13/build-context.json" \
            --base "$BASE" \
            --output "$SOURCE_DIR/.op13" \
            --output "$DEBUG_DIR"

      - name: Configure kernel and modules
        run: |
          set -euo pipefail
          bash scripts/configure.sh \
            --base "$BASE" \
            --profile "$PROFILE" \
            --root "$ROOT_VARIANT" \
            --optimization "$OPTIMIZATION" \
            --lto "$LTO_MODE" \
            --build-target "$BUILD_TARGET" \
            --source-dir "$SOURCE_DIR" \
            --output "$BUILD_DIR"

      - name: Build kernel
        if: inputs.target != 'modules'
        env:
          EXTRA_KBUILD_ARGS: ${{ inputs.base == 'oos16' && '--jobs=2 --local_ram_resources=8192' || '' }}
        run: |
          set -euo pipefail
          args=(--source-dir "$SOURCE_DIR" --output "$BUILD_DIR")
          [[ "$CLEAN_BUILD" == true ]] && args+=(--clean)
          [[ "$DEBUG_BUILD" == true ]] && args+=(--debug)
          bash scripts/run-observed-kernel-build.sh \
            --debug-dir "$DEBUG_DIR" \
            -- bash scripts/build-kernel.sh "${args[@]}"

      - name: Measure audited Bazel cache for save
        id: compile-cache-size
        if: always() && inputs.cache && !inputs.clean && inputs.target != 'modules'
        env:
          CACHE_HIT: ${{ steps.compile-cache-restore.outputs.cache-hit }}
          CACHE_PATH: ${{ steps.compile-cache-identity.outputs.path }}
          UPSTREAM_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          mkdir -p "$DEBUG_DIR"
          limit_bytes=$COMPILE_CACHE_MAX_BYTES
          cache_bytes=0
          cache_human=absent
          save=false
          reason=missing
          if [[ -d "$CACHE_PATH" ]]; then
            cache_bytes=$(du --summarize --bytes -- "$CACHE_PATH" | cut -f1)
            cache_human=$(du -sh -- "$CACHE_PATH" | cut -f1)
            reason=empty
          fi
          if [[ "$UPSTREAM_STATUS" != success ]]; then
            reason=upstream-failure
          elif [[ "${CACHE_HIT:-false}" == true ]]; then
            reason=exact-hit
          elif ((cache_bytes == 0)); then
            reason=empty
          elif ! python3 -c \
            'import sys; raise SystemExit(0 if int(sys.argv[1]) <= int(sys.argv[2]) else 1)' \
            "$cache_bytes" "$limit_bytes"; then
            reason=oversize
          else
            save=true
            reason=eligible
          fi
          {
            echo "save=$save"
            echo "reason=$reason"
          } >> "$GITHUB_OUTPUT"
          {
            echo "compile_cache_post_bytes=$cache_bytes"
            echo "compile_cache_post_human=$cache_human"
            echo "compile_cache_limit_bytes=$limit_bytes"
            echo "compile_cache_save_eligible=$save"
            echo "compile_cache_save_reason=$reason"
          } >> "$DEBUG_DIR/cache-statistics.txt"

      - name: Save audited Bazel compile cache
        id: compile-cache-save
        if: success() && inputs.cache && !inputs.clean && inputs.target != 'modules' && steps.compile-cache-size.outputs.save == 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.compile-cache-identity.outputs.path }}
          key: ${{ steps.compile-cache-identity.outputs.key }}

      - name: Record compile cache save result
        if: always()
        env:
          SAVE_OUTCOME: ${{ steps.compile-cache-save.outcome }}
          SAVE_ELIGIBLE: ${{ steps.compile-cache-size.outputs.save }}
          SAVE_REASON: ${{ steps.compile-cache-size.outputs.reason }}
          SAVE_KEY: ${{ steps.compile-cache-identity.outputs.key }}
        run: |
          set -euo pipefail
          mkdir -p "$DEBUG_DIR"
          {
            echo "compile_cache_save_outcome=${SAVE_OUTCOME:-skipped}"
            echo "compile_cache_save_eligible=${SAVE_ELIGIBLE:-skipped}"
            echo "compile_cache_save_reason=${SAVE_REASON:-skipped}"
            echo "compile_cache_save_key=$SAVE_KEY"
          } >> "$DEBUG_DIR/cache-statistics.txt"

      - name: Build external modules
        if: inputs.target == 'modules' || inputs.target == 'mixed'
        run: |
          set -euo pipefail
          args=(
            --source-dir "$SOURCE_DIR"
            --kernel-output "$BUILD_DIR"
            --output "$MODULE_DIR"
          )
          # A modules-only artifact is produced from a prior mixed build and
          # therefore already contains module staging.  Always replace that
          # staging so stale modules cannot leak into the new package.
          if [[ "$CLEAN_BUILD" == true || "$BUILD_TARGET" == modules ]]; then
            args+=(--clean)
          fi
          [[ "$DEBUG_BUILD" == true ]] && args+=(--debug)
          bash scripts/build-modules.sh "${args[@]}"

      - name: Verify configuration and outputs
        run: |
          set -euo pipefail
          bash scripts/verify.sh \
            --base "$BASE" \
            --profile "$PROFILE" \
            --root "$ROOT_VARIANT" \
            --build-target "$BUILD_TARGET" \
            --output "$BUILD_DIR"

      - name: Package build outputs
        run: |
          set -euo pipefail
          args=(
            --base "$BASE"
            --profile "$PROFILE"
            --root "$ROOT_VARIANT"
            --build-target "$BUILD_TARGET"
            --input "$BUILD_DIR"
            --output "$DIST_DIR"
          )
          [[ "$DEBUG_BUILD" == true ]] && args+=(--debug)
          [[ "$PRE_RELEASE" == true ]] && args+=(--pre-release)
          bash scripts/package.sh "${args[@]}"

      - name: Verify packaged checksums and context
        run: |
          set -euo pipefail
          python3 scripts/verify-package-checksums.py \
            --directory "$DIST_DIR" \
            --context "$BUILD_DIR/.op13/build-context.json"

      - name: Collect diagnostics
        if: always()
        run: |
          set -uo pipefail
          mkdir -p "$DEBUG_DIR"
          df -h > "$DEBUG_DIR/disk-after.txt"
          du -sh out/* > "$DEBUG_DIR/output-sizes.txt" 2>&1 || true
          find out -type f \( -name '*.log' -o -name '*.txt' \) -print0 \
            | xargs -0 -r grep -H -E -i 'warning:|error:' \
            > "$DEBUG_DIR/warnings.txt" 2>/dev/null || true
          {
            echo '## Final build footprint'
            echo
            echo '```text'
            cat "$DEBUG_DIR/output-sizes.txt"
            df -h / "$GITHUB_WORKSPACE"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Release source checkout before kernel archive
        if: success() && inputs.target != 'modules'
        run: |
          set -euo pipefail
          if [[ -d "$SOURCE_DIR/.op13" ]]; then
            cp -a "$SOURCE_DIR/.op13" "$DEBUG_DIR/source-context"
          fi
          workspace_root=$(realpath -e -- "$GITHUB_WORKSPACE")
          source_root=$(realpath -e -- "$SOURCE_DIR")
          if [[ "$source_root" != "$workspace_root/out/source" ]]; then
            echo "source cleanup resolved outside the expected workspace path: $source_root" >&2
            exit 2
          fi
          rm -rf --one-file-system -- "$source_root"
          df -h / "$GITHUB_WORKSPACE" > "$DEBUG_DIR/disk-after-source-release.txt"

      - name: Archive reusable kernel output
        if: success() && inputs.target == 'mixed'
        env:
          ARTIFACT_NAME: ${{ steps.artifact-names.outputs.kernel }}
        run: |
          set -euo pipefail
          test ! -e "$KERNEL_ARTIFACT_DIR"
          mkdir -p "$KERNEL_ARTIFACT_DIR"
          python3 scripts/kernel-artifact-archive.py create \
            --source-dir "$BUILD_DIR" \
            --archive "$KERNEL_ARTIFACT_DIR/kernel-build.tar.zst" \
            --manifest "$KERNEL_ARTIFACT_DIR/KERNEL-ARTIFACT-MANIFEST.json" \
            > /dev/null
          python3 scripts/kernel-artifact-bundle.py seal \
            --directory "$KERNEL_ARTIFACT_DIR" \
            --build-context "$BUILD_DIR/.op13/build-context.json" \
            --repository "$GITHUB_REPOSITORY" \
            --head-sha "$GITHUB_SHA" \
            --run-id "$GITHUB_RUN_ID" \
            --run-attempt "$GITHUB_RUN_ATTEMPT" \
            --artifact-name "$ARTIFACT_NAME" \
            --base "$BASE" \
            --root "$ROOT_VARIANT" \
            --profile "$PROFILE" \
            --optimization "$OPTIMIZATION" \
            --lto "$LTO_MODE" \
            --branding "$KERNEL_BRANDING" \
            --build-timestamp "$BUILD_TIMESTAMP" \
            > "$DEBUG_DIR/kernel-artifact-bundle-seal.json"

      - name: Upload reusable kernel output
        if: success() && inputs.target == 'mixed'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.artifact-names.outputs.kernel }}
          path: out/kernel-artifact
          if-no-files-found: error
          compression-level: 0
          overwrite: true
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

      - name: Upload packages
        id: upload-packages
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.artifact-names.outputs.package }}
          path: out/dist
          if-no-files-found: error
          include-hidden-files: true
          overwrite: true
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

      - name: Upload debug evidence
        if: always() && (inputs.debug || failure())
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: debug-${{ inputs.base }}-${{ inputs.root }}-${{ inputs.profile }}-${{ inputs.target }}-${{ inputs.optimization }}-${{ inputs.lto }}-${{ github.run_id }}-attempt-${{ github.run_attempt }}
          path: |
            out/debug
            out/source/.op13
            out/build/.op13
            !out/build/.op13/config-work/**
            !out/build/.op13/config-work-msm-kernel/**
            out/build/.config
            out/build/vmlinux
            out/build/System.map
            out/build/Module.symvers
            out/build/modules
            out/dist/SHA256SUMS
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
