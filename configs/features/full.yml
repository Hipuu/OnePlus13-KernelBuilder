{
  "$schema": "../../schemas/feature-profile.schema.json",
  "schema_version": 1,
  "id": "full",
  "label": "Full feature set",
  "description": "The complete supported OnePlus Wild and NetHunter feature union.",
  "root": {
    "supported_variants": ["kernelsu", "kernelsu-next"],
    "default_variant": "kernelsu-next"
  },
  "feature_flags": {
    "root.kernelsu": true,
    "root.kernelsu_next": true,
    "root.susfs": true,
    "oneplus.hmbird_fengchi_scx": true,
    "oneplus.baseband_guard": true,
    "oneplus.module_overlay_interception": true,
    "oneplus.droidspaces": true,
    "oneplus.ntsync": true,
    "oneplus.rust_binder": false,
    "oneplus.tmpfs_xattr_acl": true,
    "oneplus.unicode_fix": true,
    "oneplus.fake_config": true,
    "performance.oryon": true,
    "performance.memory": true,
    "performance.io": true,
    "performance.scheduler": true,
    "performance.optimization_o2_o3": true,
    "performance.lto_thin_full": true,
    "network.bbr": true,
    "network.bbrv3": true,
    "network.qdisc_cake": true,
    "network.qdisc_pie": true,
    "network.qdisc_fq": true,
    "network.ttl_hl": true,
    "network.ip_set": true,
    "network.ipv6_nat": true,
    "nethunter.usb_bluetooth_hci": true,
    "nethunter.sdr_airspy": true,
    "nethunter.sdr_hackrf": true,
    "nethunter.can_core": true,
    "nethunter.can_vcan": true,
    "nethunter.can_slcan": true,
    "nethunter.can_usb": true,
    "nethunter.usb_serial": true,
    "nethunter.wifi_ath": true,
    "nethunter.wifi_mt76": true,
    "nethunter.wifi_rtw88": true,
    "nethunter.memkernel": true,
    "build.kernel_only": true,
    "build.modules_only": true,
    "build.mixed": true,
    "build.monolithic": false,
    "build.cache": true,
    "build.debug": true,
    "build.custom_branding": true,
    "build.custom_timestamp": true,
    "artifact.image": true,
    "artifact.anykernel3": true,
    "artifact.module_zip": true,
    "artifact.wireless_firmware": true,
    "artifact.debug_bundle": true,
    "artifact.raw_partition_images": false
  },
  "patch_series": [
    "patches/series/common.yml",
    "patches/series/wild.yml",
    "patches/series/nethunter.yml"
  ],
  "kconfig_fragments": [
    {
      "path": "patches/common/config-wild.config",
      "scope": "common",
      "required": true,
      "kernel_trees": ["common", "msm-kernel"]
    },
    {
      "path": "patches/nethunter/config-nethunter-common.config",
      "scope": "common",
      "required": true
    },
    {
      "path": "patches/nethunter/config-nethunter-modules.config",
      "scope": "modules",
      "required": true
    }
  ],
  "required_symbols": {
    "CONFIG_KSU": "y",
    "CONFIG_KSU_KPROBES_HOOK": "n",
    "CONFIG_KSU_SUSFS": "y",
    "CONFIG_KSU_SUSFS_SUS_PATH": "y",
    "CONFIG_KSU_SUSFS_SUS_MOUNT": "y",
    "CONFIG_KSU_SUSFS_SUS_KSTAT": "y",
    "CONFIG_KSU_SUSFS_SPOOF_UNAME": "y",
    "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS": "y",
    "CONFIG_KSU_SUSFS_OPEN_REDIRECT": "y",
    "CONFIG_KSU_SUSFS_SUS_MAP": "y",
    "CONFIG_HMBIRD_SCHED": "y",
    "CONFIG_BBG": "y",
    "CONFIG_NTSYNC": "y",
    "CONFIG_TMPFS_XATTR": "y",
    "CONFIG_TMPFS_POSIX_ACL": "y",
    "CONFIG_SYSVIPC": "y",
    "CONFIG_PID_NS": "y",
    "CONFIG_POSIX_MQUEUE": "y",
    "CONFIG_USER_NS": "y",
    "CONFIG_TCP_CONG_BBR": "y",
    "CONFIG_TCP_CONG_BBR3": "y",
    "CONFIG_NET_SCH_FQ": "y",
    "CONFIG_NET_SCH_CAKE": "y",
    "CONFIG_NET_SCH_PIE": "y",
    "CONFIG_IP_NF_TARGET_TTL": "y",
    "CONFIG_IP6_NF_TARGET_HL": "y",
    "CONFIG_IP_SET": "y",
    "CONFIG_IP_SET_MAX": "65534",
    "CONFIG_NETFILTER_XT_SET": "y",
    "CONFIG_IP6_NF_NAT": "y",
    "CONFIG_IP6_NF_TARGET_MASQUERADE": "y",
    "CONFIG_MEDIA_SUBDRV_AUTOSELECT": "n",
    "CONFIG_BT_HCIBTUSB": "m",
    "CONFIG_BT_HCIVHCI": "m",
    "CONFIG_USB_AIRSPY": "y",
    "CONFIG_USB_HACKRF": "y",
    "CONFIG_CAN": "m",
    "CONFIG_CAN_VCAN": "m",
    "CONFIG_CAN_SLCAN": "m",
    "CONFIG_CAN_GS_USB": "m",
    "CONFIG_CAN_KVASER_USB": "m",
    "CONFIG_CAN_PEAK_USB": "m",
    "CONFIG_USB_SERIAL": "m",
    "CONFIG_USB_SERIAL_CH341": "m",
    "CONFIG_USB_SERIAL_FTDI_SIO": "m",
    "CONFIG_USB_SERIAL_PL2303": "m",
    "CONFIG_CFG80211": "m",
    "CONFIG_MAC80211": "m",
    "CONFIG_CRYPTO_MICHAEL_MIC": "m",
    "CONFIG_ATH9K_HTC": "m",
    "CONFIG_ATH10K_USB": "m",
    "CONFIG_ATH11K": "m",
    "CONFIG_ATH11K_PCI": "m",
    "CONFIG_MT7601U": "m",
    "CONFIG_MT76_USB": "m",
    "CONFIG_MT76x0U": "m",
    "CONFIG_MT76x2U": "m",
    "CONFIG_MT7663U": "m",
    "CONFIG_MT7921U": "m",
    "CONFIG_MEMKERNEL": "m",
    "CONFIG_LRU_GEN_ENABLED": "y"
  },
  "external_modules": ["rtw88"],
  "defaults": {
    "optimization": "O2",
    "lto": "thin"
  }
}
